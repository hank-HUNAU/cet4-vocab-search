name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Move API routes (incompatible with static export)
        run: |
          mkdir -p /tmp/api-backup
          mv src/app/api /tmp/api-backup/

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: "/cet4-vocab-search"
        run: npx next build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Restore API routes
        run: |
          mv /tmp/api-backup/api src/app/api
        if: always()

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
